version: '3.9'

services:
  # PostgreSQL automatically checks directory "/var/lib/postgresql/data".
  # if it's empty create default superuser "postgres" and database "postgres"
  database:
    # postrgres:18+ - too much(conflicts)
    image: postgres:17
    volumes: 
      - pg_volume:/var/lib/postgresql/data # default path for PostgreSQL
    # alternative to environment if there are plenty of env vars
    env_file:
      - ./db/.db.env
    networks:
      - net-back
    healthcheck:
      # this is from SQLALCHEMY_DATABASE_URL = f"postgresql://postgres:postgres@{HOST}/postgres"
      # -U - user, -d - database, pg-isready - utility
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  init:
    build:
      context: backend/
      dockerfile: ../docker/backend.Dockerfile
    environment: 
      DB_HOST: database
    command: python3 init_db.py
    networks:
      - net-back
    depends_on:
      database:
        condition: service_healthy # demands healthcheck from depended service
        restart: false # restart container in case of restarting depended one
        required: true

  backend:
    build:
      context: backend/
      dockerfile: ../docker/backend.Dockerfile
    # instead of "docker run -e DB_HOST=database backend-image"
    environment: 
      DB_HOST: database # must be the same as the name of db service(in our case "database")
      # - DB_HOST=database - alternative(no spaces before and after '=')
    networks:
      - net-back
      - net-front
    # ports ain't needed for backend since services can communicate freely in the container
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://0.0.0.0:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    depends_on:
      database:
        condition: service_healthy
        restart: true
        required: true
      init:
        condition: service_completed_successfully
        restart: false
        required: true

  frontend:
    image: nginx
    ports:
      - "8189:80"
    volumes:
      # from "users.html" and "nginx.conf" (better to create and mount directory named "static")
      - ./frontend/styles.css:/usr/share/nginx/html/static/styles.css

      # according to "hub.docker.com/_/nginx"
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf

      # the string below is incorrect since our "nginx.conf" contains only block "server",
      # but "/etc/nginx/nginx.conf" is main config-file
      # - ./frontend/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - net-front
    depends_on:
      backend:
        condition: service_healthy
        restart: true
        required: true


# for clarity, not necessary(docker handles it without explicit declaration)
volumes:
  pg_volume:

networks:
  net-front:
    # for clatiry, not necessary(host- the fastest, overlay - for claster, none - for isolation)
    driver: bridge
  net-back:
    driver: bridge